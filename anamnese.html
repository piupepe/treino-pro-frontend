<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Treino Pro">
    <title>Anamnese - Treino Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-dark: #0a0e27;
            --bg-card: #1a1f3a;
            --bg-input: #242a45;
            --primary: #FF6B35;
            --primary-light: #FF8A5B;
            --secondary: #00d4ff;
            --accent-purple: #7c3aed;
            --text-primary: #ffffff;
            --text-secondary: #a0aec0;
            --border: #2d3748;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent-purple) 100%);
            padding: 30px 20px;
            border-radius: 20px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .header p {
            font-size: 13px;
            opacity: 0.9;
            font-weight: 600;
        }
        
        .progress-bar {
            background: rgba(0, 0, 0, 0.2);
            height: 4px;
            border-radius: 2px;
            margin-top: 16px;
            overflow: hidden;
        }
        
        .progress-fill {
            background: white;
            height: 100%;
            transition: width 0.3s ease;
        }
        
        .form-card {
            background: linear-gradient(135deg, var(--bg-card) 0%, rgba(26, 31, 58, 0.5) 100%);
            border: 2px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 800;
            margin-bottom: 10px;
            text-transform: uppercase;
            color: var(--text-secondary);
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            background: var(--bg-input);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--secondary);
            background: rgba(0, 212, 255, 0.1);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        
        .form-row .form-group {
            margin-bottom: 0;
        }
        
        .button-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 30px;
        }
        
        .btn {
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent-purple) 100%);
            color: white;
            grid-column: 1 / -1;
        }
        
        .btn-primary:active {
            transform: translateY(2px);
        }
        
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: rgba(160, 174, 192, 0.1);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        
        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #fca5a5;
            padding: 12px;
            border-radius: 10px;
            font-size: 12px;
            margin-bottom: 16px;
            display: none;
        }
        
        .success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid #10b981;
            color: #86efac;
            padding: 12px;
            border-radius: 10px;
            font-size: 12px;
            margin-bottom: 16px;
            display: none;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .spinner {
            border: 3px solid rgba(255, 107, 53, 0.2);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .status-toast {
            position: fixed;
            bottom: 20px;
            right: 16px;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 800;
            z-index: 100;
            display: none;
            text-transform: uppercase;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        
        .status-toast.success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
        }
        
        .status-toast.error {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Anamnese</h1>
            <p>Conheça seu perfil de treinamento</p>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
        </div>
        
        <div class="error" id="errorMsg"></div>
        <div class="success" id="successMsg"></div>
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 12px; font-size: 12px; color: var(--text-secondary);">Salvando...</p>
        </div>
        
        <form id="anaForm" onsubmit="handleSubmit(event)">
            <!-- DADOS PESSOAIS -->
            <div class="form-card">
                <h3 style="font-size: 16px; margin-bottom: 16px; color: var(--primary);">👤 Dados Pessoais</h3>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Idade (anos)</label>
                        <input type="number" id="age" min="18" max="100" required>
                    </div>
                    <div class="form-group">
                        <label>Peso (kg)</label>
                        <input type="number" id="weight" min="30" max="300" step="0.5" required>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Altura (cm)</label>
                        <input type="number" id="height" min="140" max="220" required>
                    </div>
                </div>
            </div>
            
            <!-- EXPERIÊNCIA -->
            <div class="form-card">
                <h3 style="font-size: 16px; margin-bottom: 16px; color: var(--primary);">💪 Experiência</h3>
                
                <div class="form-group">
                    <label>Nível de experiência</label>
                    <select id="experienceLevel" required>
                        <option value="">Selecione...</option>
                        <option value="iniciante">Iniciante (0-1 anos)</option>
                        <option value="intermediario">Intermediário (1-3 anos)</option>
                        <option value="avancado">Avançado (3+ anos)</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Objetivo principal</label>
                    <select id="mainGoal" required>
                        <option value="">Selecione...</option>
                        <option value="hipertrofia">Hipertrofia (ganhar músculo)</option>
                        <option value="forca">Força (aumentar força)</option>
                        <option value="resistencia">Resistência (melhorar condicionamento)</option>
                        <option value="deficit">Déficit (perder gordura)</option>
                    </select>
                </div>
            </div>
            
            <!-- DISPONIBILIDADE -->
            <div class="form-card">
                <h3 style="font-size: 16px; margin-bottom: 16px; color: var(--primary);">⏰ Disponibilidade</h3>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Dias por semana</label>
                        <select id="availableDays" required>
                            <option value="">Selecione...</option>
                            <option value="2">2 dias</option>
                            <option value="3">3 dias</option>
                            <option value="4">4 dias</option>
                            <option value="5">5 dias</option>
                            <option value="6">6 dias</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Duração (minutos)</label>
                        <select id="sessionDuration" required>
                            <option value="">Selecione...</option>
                            <option value="30">30 minutos</option>
                            <option value="45">45 minutos</option>
                            <option value="60">60 minutos</option>
                            <option value="90">90 minutos</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <!-- EQUIPAMENTOS -->
            <div class="form-card">
                <h3 style="font-size: 16px; margin-bottom: 16px; color: var(--primary);">🏋️ Equipamentos</h3>
                
                <div class="form-group">
                    <label>Disponibilidade de equipamentos</label>
                    <select id="equipment" required>
                        <option value="">Selecione...</option>
                        <option value="academia_completa">Academia completa</option>
                        <option value="casa">Em casa (halteres/barras)</option>
                        <option value="misto">Misto (academia + casa)</option>
                    </select>
                </div>
            </div>
            
            <!-- LESÕES -->
            <div class="form-card">
                <h3 style="font-size: 16px; margin-bottom: 16px; color: var(--primary);">⚠️ Lesões/Limitações</h3>
                
                <div class="form-group">
                    <label>Tem alguma lesão ou limitação?</label>
                    <input type="text" id="injuries" placeholder="Digite aqui ou 'Nenhuma'">
                </div>
                
                <div class="form-group">
                    <label>Histórico de treinamento</label>
                    <input type="text" id="trainingHistory" placeholder="Ex: treino 4 anos, foco hipertrofia...">
                </div>
            </div>
            
            <!-- PREFERÊNCIAS -->
            <div class="form-card">
                <h3 style="font-size: 16px; margin-bottom: 16px; color: var(--primary);">⭐ Preferências</h3>
                
                <div class="form-group">
                    <label>Outras preferências</label>
                    <input type="text" id="preferences" placeholder="Ex: prefiro treinar de manhã...">
                </div>
            </div>
            
            <div class="button-row">
                <button type="submit" class="btn btn-primary" id="submitBtn">Salvar Anamnese</button>
                <button type="button" class="btn btn-secondary" onclick="logout()">Sair</button>
            </div>
        </form>
    </div>
    
    <div class="status-toast" id="statusToast"></div>
    
    <script>
        const API_URL = "https://treino-pro-api.onrender.com";
        
        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('successMsg').style.display = 'none';
        }
        
        function showSuccess(msg) {
            const el = document.getElementById('successMsg');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('errorMsg').style.display = 'none';
        }
        
        function clearMessages() {
            document.getElementById('errorMsg').style.display = 'none';
            document.getElementById('successMsg').style.display = 'none';
        }
        
        function showLoading(show = true) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
            document.getElementById('submitBtn').disabled = show;
        }
        
        function toast(msg, type) {
            const t = document.getElementById('statusToast');
            t.textContent = msg;
            t.className = `status-toast ${type}`;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3500);
        }
        
        function updateProgress() {
            const form = document.getElementById('anaForm');
            const inputs = form.querySelectorAll('input[required], select[required]');
            const filled = Array.from(inputs).filter(inp => inp.value).length;
            const percentage = (filled / inputs.length) * 100;
            document.getElementById('progressFill').style.width = percentage + '%';
        }
        
        // Update progress on input change
        document.getElementById('anaForm').addEventListener('change', updateProgress);
        document.getElementById('anaForm').addEventListener('input', updateProgress);
        
        async function handleSubmit(event) {
            event.preventDefault();
            
            const userId = localStorage.getItem('user_id');
            if (!userId) {
                showError('Usuário não autenticado. Faça login novamente.');
                setTimeout(() => window.location.href = 'index.html', 2000);
                return;
            }
            
            // Validar campos obrigatórios
            const requiredFields = ['age', 'weight', 'height', 'experienceLevel', 'mainGoal', 'availableDays', 'sessionDuration', 'equipment'];
            const incomplete = requiredFields.some(field => !document.getElementById(field).value);
            
            if (incomplete) {
                showError('Preencha todos os campos obrigatórios');
                return;
            }
            
            showLoading(true);
            clearMessages();
            
            const data = {
                user_id: userId,
                age: parseInt(document.getElementById('age').value),
                weight: parseFloat(document.getElementById('weight').value),
                height: parseInt(document.getElementById('height').value),
                experience_level: document.getElementById('experienceLevel').value,
                main_goal: document.getElementById('mainGoal').value,
                available_days: parseInt(document.getElementById('availableDays').value),
                session_duration: parseInt(document.getElementById('sessionDuration').value),
                equipment: document.getElementById('equipment').value,
                injuries: document.getElementById('injuries').value || 'Nenhuma',
                training_history: document.getElementById('trainingHistory').value || '',
                preferences: document.getElementById('preferences').value || ''
            };
            
            try {
                const response = await fetch(`${API_URL}/api/anamnese/save`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    showSuccess('✅ Anamnese salva com sucesso!');
                    toast('✅ Pronto! Vamos gerar seus treinos!', 'success');
                    
                    // Marcar que tem anamnese
                    localStorage.setItem('has_anamnese', 'true');
                    
                    // Redirecionar para gerador de treinos
                    setTimeout(() => {
                        window.location.href = 'treino_pro_final.html';
                    }, 1500);
                } else {
                    showError(result.error || 'Erro ao salvar anamnese');
                    toast('❌ Erro ao salvar', 'error');
                }
            } catch (error) {
                console.error('Erro:', error);
                showError('Erro de conexão: ' + error.message);
                toast('❌ Erro de conexão', 'error');
            } finally {
                showLoading(false);
            }
        }
        
        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
        
        // Verificar autenticação
        window.addEventListener('load', () => {
            const userId = localStorage.getItem('user_id');
            if (!userId) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
