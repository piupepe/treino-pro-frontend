<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Treino Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; height: 100vh; overflow: hidden; }
        .container { display: flex; flex-direction: column; height: 100vh; }
        .header { background: linear-gradient(135deg, #FF6B35, #004E89); color: white; padding: 20px; text-align: center; }
        .tabs { display: flex; background: #f8f8f8; border-bottom: 1px solid #e0e0e0; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; cursor: pointer; font-size: 11px; font-weight: 600; color: #999; border-bottom: 3px solid transparent; white-space: nowrap; }
        .tab-btn.active { color: #FF6B35; border-bottom-color: #FF6B35; background: white; }
        .content { flex: 1; overflow-y: auto; padding: 16px; display: none; }
        .content.active { display: block; }
        .workout-card { padding: 16px; border: 2px solid #e0e0e0; border-radius: 12px; text-align: center; cursor: pointer; background: white; margin-bottom: 12px; }
        .workout-card.selected { border-color: #FF6B35; background: rgba(255, 107, 53, 0.05); }
        .workout-card h3 { font-size: 14px; margin-bottom: 8px; }
        .exercise-item { background: white; border: 1px solid #e0e0e0; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        .weight-section { background: #f5f5f5; padding: 12px; border-radius: 8px; margin-bottom: 12px; }
        .weight-adjustment { display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: center; }
        .btn-adjust { padding: 8px 12px; font-size: 12px; border: none; border-radius: 6px; background: #FF6B35; color: white; cursor: pointer; }
        .weight-display { text-align: center; font-weight: 600; color: #FF6B35; font-size: 16px; }
        .sets-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .set-input { display: flex; flex-direction: column; gap: 4px; }
        .set-input input { padding: 8px; border: 1px solid #e0e0e0; border-radius: 6px; font-size: 12px; text-align: center; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 8px; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px; font-family: inherit; }
        .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .btn { padding: 14px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
        .btn-primary { background: #FF6B35; color: white; }
        .btn-secondary { background: #004E89; color: white; }
        .session-card { background: white; border: 1px solid #e0e0e0; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        .empty-state { text-align: center; padding: 40px 20px; color: #999; }
        .status-bar { position: fixed; top: 80px; right: 10px; padding: 10px 16px; border-radius: 8px; font-size: 12px; font-weight: 600; display: none; z-index: 100; }
        .status-bar.success { background: #2ECE80; color: white; }
        .status-bar.error { background: #E63946; color: white; }
        .status-bar.connecting { background: #FFB703; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💪 Treino Pro v3</h1>
            <p>Rastreador com Supabase</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" id="btn-log" onclick="switchTab('log')">📋 Treino</button>
            <button class="tab-btn" id="btn-history" onclick="switchTab('history')">📊 Histórico</button>
            <button class="tab-btn" id="btn-analysis" onclick="switchTab('analysis')">🤖 Análises</button>
            <button class="tab-btn" id="btn-config" onclick="switchTab('config')">⚙️ Config</button>
        </div>

        <div class="content active" id="log">
            <h2 style="margin-bottom: 16px; font-size: 16px;">Qual treino?</h2>
            <div id="workoutSelector"></div>
            <div id="exerciseSection" style="display: none;">
                <h2 style="margin-bottom: 16px; font-size: 16px;">Registre exercícios</h2>
                <div id="exerciseList"></div>
                <div class="form-group">
                    <label>📝 Notas</label>
                    <textarea id="sessionNotes"></textarea>
                </div>
                <div class="form-group">
                    <label>⚡ Energia (1-10)</label>
                    <input type="number" id="energyLevel" min="1" max="10" value="7">
                </div>
                <div class="form-group">
                    <label>😴 Sono (h)</label>
                    <input type="number" id="sleepHours" min="0" max="12" step="0.5" value="7">
                </div>
                <div class="button-group">
                    <button class="btn btn-primary" id="btn-submit" onclick="submitSession()">✅ Salvar</button>
                    <button class="btn btn-secondary" id="btn-clear" onclick="clearSelection()">❌ Limpar</button>
                </div>
            </div>
        </div>

        <div class="content" id="history">
            <h2 style="margin-bottom: 16px;">📊 Histórico</h2>
            <div id="historyList"></div>
            <div id="emptyHistory" class="empty-state">📭 Nenhum treino</div>
        </div>

        <div class="content" id="analysis">
            <h2 style="margin-bottom: 16px;">🤖 Análises</h2>
            <div id="analysisList"></div>
            <div id="emptyAnalysis" class="empty-state">📭 Nenhuma análise</div>
        </div>

        <div class="content" id="config">
            <h2 style="margin-bottom: 16px;">⚙️ Config</h2>
            <div style="background: #f9f9f9; padding: 16px; border-radius: 12px;">
                <div class="form-group">
                    <label>API Render</label>
                    <input type="url" id="apiUrl" value="https://treino-pro-api.onrender.com">
                </div>
                <div class="button-group">
                    <button class="btn btn-primary" id="btn-save-config" onclick="saveConfig()">💾 Salvar</button>
                    <button class="btn btn-secondary" id="btn-test-api" onclick="testAPI()">🧪 Testar</button>
                </div>
                <div id="apiStatus" style="margin-top: 12px; font-size: 13px;">Status: OK</div>
            </div>
        </div>
    </div>

    <div class="status-bar" id="statusBar"></div>

    <script>
        // CONFIG
        const SUPABASE_URL = "https://ulsiumdpepyhjbgzghmg.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVsc2l1bWRwZXl5aGpiZ3pnaG1nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NTE3OTQsImV4cCI6MjA5MjUyNzc5NH0.R6fIQRp_SE0e0Jp_PrD1PytXIH8gvACYfxbaN9t2OT4";
        const supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const workouts = {
            1: { name: "UPPER A", exercises: [
                { name: "Supino Reto", planned: "4x6-8", baseWeight: 45 },
                { name: "Remada Curvada", planned: "4x6-8", baseWeight: 40 },
                { name: "Remada Cavalo", planned: "3x8-10", baseWeight: 40 },
                { name: "Puxada Pronada", planned: "3x8-10", baseWeight: 50 },
            ]},
            2: { name: "LOWER A", exercises: [
                { name: "Leg Press 45°", planned: "3x6-8", baseWeight: 160 },
                { name: "Hack Squat", planned: "3x8-10", baseWeight: 60 },
                { name: "Leg Curl Sentado", planned: "3x10", baseWeight: 45 },
                { name: "Extensora", planned: "3x10-12", baseWeight: 80 },
            ]},
            3: { name: "UPPER B", exercises: [
                { name: "Desenvolvimento Halter", planned: "4x6-8", baseWeight: 23 },
                { name: "Supino Inclinado", planned: "4x8-10", baseWeight: 28 },
                { name: "Puxada Alta", planned: "3x10-12", baseWeight: 50 },
                { name: "Rosca", planned: "3x8-10", baseWeight: 17 },
            ]},
            4: { name: "LOWER B", exercises: [
                { name: "Agachamento Búlgaro", planned: "4x6-8", baseWeight: 18 },
                { name: "Leg Press", planned: "3x6-8", baseWeight: 160 },
                { name: "Stiff Leg Deadlift", planned: "3x6-8", baseWeight: 40 },
                { name: "Leg Curl Máquina", planned: "3x8-10", baseWeight: 55 },
            ]}
        };

        let selectedWorkout = null;
        let exerciseWeights = JSON.parse(localStorage.getItem('exerciseWeights')) || {};
        let config = JSON.parse(localStorage.getItem('config')) || { apiUrl: 'https://treino-pro-api.onrender.com' };

        // INIT
        window.addEventListener('load', function() {
            renderWorkouts();
            loadConfig();
            loadHistory();
            loadAnalysis();
        });

        // FUNÇÕES
        function renderWorkouts() {
            const sel = document.getElementById('workoutSelector');
            sel.innerHTML = Object.entries(workouts).map(([id, w]) => 
                `<div class="workout-card" onclick="selectWorkout(${id})"><h3>${w.name}</h3><p>${w.exercises.length} exercícios</p></div>`
            ).join('');
        }

        function switchTab(tab) {
            document.querySelectorAll('.content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
            if (tab === 'history') loadHistory();
            if (tab === 'analysis') loadAnalysis();
        }

        function selectWorkout(id) {
            selectedWorkout = id;
            document.querySelectorAll('.workout-card').forEach(c => c.classList.remove('selected'));
            event.target.closest('.workout-card').classList.add('selected');
            document.getElementById('exerciseSection').style.display = 'block';
            
            const list = document.getElementById('exerciseList');
            list.innerHTML = '';
            
            workouts[id].exercises.forEach((ex, idx) => {
                const weight = exerciseWeights[ex.name] || ex.baseWeight;
                const html = `
                    <div class="exercise-item">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
                            <div style="font-weight: 600;">${ex.name}</div>
                            <div style="font-size: 11px; background: #f5f5f5; padding: 4px 8px; border-radius: 6px;">${ex.planned}</div>
                        </div>
                        <div class="weight-section">
                            <label style="display: block; font-size: 10px; margin-bottom: 8px;">⚖️ Peso (kg)</label>
                            <div class="weight-adjustment">
                                <button class="btn-adjust" onclick="adjustWeight('${ex.name}', -1)">-1kg</button>
                                <div class="weight-display" id="weight-${idx}">${weight}</div>
                                <button class="btn-adjust" onclick="adjustWeight('${ex.name}', 1)">+1kg</button>
                            </div>
                        </div>
                        <div class="sets-container">
                            <div class="set-input"><label>S1</label><input type="number" placeholder="Reps" data-ex="${idx}" data-set="1" class="reps-input"></div>
                            <div class="set-input"><label>S2</label><input type="number" placeholder="Reps" data-ex="${idx}" data-set="2" class="reps-input"></div>
                            <div class="set-input"><label>S3</label><input type="number" placeholder="Reps" data-ex="${idx}" data-set="3" class="reps-input"></div>
                        </div>
                    </div>
                `;
                list.innerHTML += html;
            });
        }

        function adjustWeight(name, delta) {
            exerciseWeights[name] = Math.max(0, (exerciseWeights[name] || 0) + delta);
            localStorage.setItem('exerciseWeights', JSON.stringify(exerciseWeights));
            Object.values(workouts).forEach(w => w.exercises.forEach((ex, idx) => {
                if (ex.name === name) {
                    const d = document.getElementById(`weight-${idx}`);
                    if (d) d.textContent = exerciseWeights[name];
                }
            }));
        }

        function clearSelection() {
            selectedWorkout = null;
            document.querySelectorAll('.workout-card').forEach(c => c.classList.remove('selected'));
            document.getElementById('exerciseSection').style.display = 'none';
        }

        function submitSession() {
            if (!selectedWorkout) { showStatus('⚠️ Selecione treino!', 'connecting'); return; }
            const workout = workouts[selectedWorkout];
            const exercises = [];
            document.querySelectorAll('.reps-input').forEach(input => {
                const idx = parseInt(input.dataset.ex);
                const ex = workout.exercises[idx];
                const set = parseInt(input.dataset.set);
                const reps = input.value;
                if (reps) {
                    let exRec = exercises.find(e => e.name === ex.name);
                    if (!exRec) {
                        exRec = { name: ex.name, planned: ex.planned, weight: exerciseWeights[ex.name] || ex.baseWeight, sets: [] };
                        exercises.push(exRec);
                    }
                    exRec.sets[set - 1] = parseInt(reps);
                }
            });
            if (exercises.length === 0) { showStatus('⚠️ Registre exercícios!', 'connecting'); return; }
            
            const session = {
                session_id: Date.now().toString(),
                date: new Date().toLocaleDateString('pt-BR'),
                time: new Date().toLocaleTimeString('pt-BR'),
                workout: workout.name,
                exercises: exercises,
                notes: document.getElementById('sessionNotes').value,
                energy: parseInt(document.getElementById('energyLevel').value),
                sleep: parseFloat(document.getElementById('sleepHours').value)
            };

            showStatus('💾 Salvando...', 'connecting');
            supa.from('sessions').insert([{
                session_id: session.session_id,
                date: session.date,
                time: session.time,
                workout: session.workout,
                exercises: JSON.stringify(session.exercises),
                energy: session.energy,
                sleep: session.sleep,
                notes: session.notes
            }]).then(() => {
                showStatus('✅ Salvo!', 'success');
                if (config.apiUrl) sendToAPI(session);
                clearSelection();
                document.getElementById('sessionNotes').value = '';
                document.getElementById('energyLevel').value = '7';
                document.getElementById('sleepHours').value = '7';
                loadHistory();
            }).catch(e => showStatus('❌ Erro: ' + e.message, 'error'));
        }

        function sendToAPI(session) {
            showStatus('📤 Enviando...', 'connecting');
            fetch(`${config.apiUrl}/webhook/session`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(session)
            }).then(r => {
                if (r.ok) {
                    showStatus('✅ Análise!', 'success');
                    setTimeout(() => loadAnalysis(), 1000);
                }
            }).catch(() => showStatus('❌ API offline', 'error'));
        }

        function loadHistory() {
            supa.from('sessions').select('*').order('created_at', { ascending: false }).limit(10).then(({ data }) => {
                const list = document.getElementById('historyList');
                const empty = document.getElementById('emptyHistory');
                if (!data || data.length === 0) { list.innerHTML = ''; empty.style.display = 'block'; return; }
                empty.style.display = 'none';
                list.innerHTML = data.map(s => `<div class="session-card"><div style="font-weight: 600;">${s.workout}</div><div style="font-size: 11px; color: #999;">${s.date} ${s.time}</div><div style="margin-top: 8px; font-size: 12px;">⚡ ${s.energy}/10 | 😴 ${s.sleep}h</div></div>`).join('');
            }).catch(e => console.error(e));
        }

        function loadAnalysis() {
            supa.from('analyses').select('*').order('created_at', { ascending: false }).limit(10).then(({ data }) => {
                const list = document.getElementById('analysisList');
                const empty = document.getElementById('emptyAnalysis');
                if (!data || data.length === 0) { list.innerHTML = ''; empty.style.display = 'block'; return; }
                empty.style.display = 'none';
                list.innerHTML = data.map(a => `<div class="session-card"><div style="font-weight: 600;">🤖 ${a.workout}</div><div style="font-size: 11px; color: #999;">${a.date}</div><div style="margin-top: 12px; font-size: 12px; line-height: 1.6; white-space: pre-wrap;">${a.analysis}</div></div>`).join('');
            }).catch(e => console.error(e));
        }

        function loadConfig() {
            document.getElementById('apiUrl').value = config.apiUrl;
        }

        function saveConfig() {
            config.apiUrl = document.getElementById('apiUrl').value;
            localStorage.setItem('config', JSON.stringify(config));
            showStatus('✅ Config salva!', 'success');
        }

        function testAPI() {
            showStatus('🧪 Testando...', 'connecting');
            fetch(`${config.apiUrl}/health`).then(r => {
                if (r.ok) showStatus('✅ API OK!', 'success');
                else showStatus('❌ API erro', 'error');
            }).catch(() => showStatus('❌ Sem conexão', 'error'));
        }

        function showStatus(msg, type) {
            const bar = document.getElementById('statusBar');
            bar.textContent = msg;
            bar.className = `status-bar ${type}`;
            bar.style.display = 'block';
            setTimeout(() => bar.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
