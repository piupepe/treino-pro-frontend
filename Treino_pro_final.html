<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Treino Pro">
    <title>Treino Pro - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-dark: #0a0e27;
            --bg-card: #1a1f3a;
            --bg-input: #242a45;
            --primary: #FF6B35;
            --primary-light: #FF8A5B;
            --secondary: #00d4ff;
            --accent-purple: #7c3aed;
            --text-primary: #ffffff;
            --text-secondary: #a0aec0;
            --border: #2d3748;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .auth-container {
            width: 100%;
            max-width: 400px;
        }
        
        .auth-card {
            background: linear-gradient(135deg, var(--bg-card) 0%, rgba(26, 31, 58, 0.5) 100%);
            border: 2px solid var(--border);
            border-radius: 20px;
            padding: 40px 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .auth-header h1 {
            font-size: 32px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent-purple) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .auth-header p {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 600;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 800;
            margin-bottom: 8px;
            text-transform: uppercase;
            color: var(--text-secondary);
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            background: var(--bg-input);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--secondary);
            background: rgba(0, 212, 255, 0.1);
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s ease;
            margin-top: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent-purple) 100%);
            color: white;
        }
        
        .btn-primary:active {
            transform: translateY(2px);
        }
        
        .btn-secondary {
            background: rgba(160, 174, 192, 0.1);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        
        .toggle-text {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        
        .toggle-text a {
            color: var(--secondary);
            text-decoration: none;
            font-weight: 800;
            cursor: pointer;
        }
        
        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #fca5a5;
            padding: 12px;
            border-radius: 10px;
            font-size: 12px;
            margin-bottom: 16px;
            display: none;
        }
        
        .success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid #10b981;
            color: #86efac;
            padding: 12px;
            border-radius: 10px;
            font-size: 12px;
            margin-bottom: 16px;
            display: none;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .spinner {
            border: 3px solid rgba(255, 107, 53, 0.2);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .hidden { display: none !important; }
        
        .status-toast {
            position: fixed;
            bottom: 20px;
            right: 16px;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 800;
            z-index: 100;
            display: none;
            text-transform: uppercase;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        
        .status-toast.success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
        }
        
        .status-toast.error {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>💪 TREINO PRO</h1>
                <p>Performance Intelligence</p>
            </div>
            
            <div class="error" id="errorMsg"></div>
            <div class="success" id="successMsg"></div>
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p style="margin-top: 12px; font-size: 12px; color: var(--text-secondary);">Processando...</p>
            </div>
            
            <!-- FORM LOGIN -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>📧 Email</label>
                    <input type="email" id="loginEmail" placeholder="seu@email.com" required>
                </div>
                
                <div class="form-group">
                    <label>🔐 Senha</label>
                    <input type="password" id="loginPassword" placeholder="Sua senha" required>
                </div>
                
                <button type="submit" class="btn btn-primary">Entrar</button>
            </form>
            
            <!-- FORM SIGNUP (oculto inicialmente) -->
            <form id="signupForm" onsubmit="handleSignup(event)" class="hidden">
                <div class="form-group">
                    <label>👤 Nome Completo</label>
                    <input type="text" id="signupName" placeholder="João Silva" required>
                </div>
                
                <div class="form-group">
                    <label>📧 Email</label>
                    <input type="email" id="signupEmail" placeholder="seu@email.com" required>
                </div>
                
                <div class="form-group">
                    <label>🔐 Senha</label>
                    <input type="password" id="signupPassword" placeholder="Mínimo 6 caracteres" required minlength="6">
                </div>
                
                <div class="form-group">
                    <label>🔐 Confirmar Senha</label>
                    <input type="password" id="signupPasswordConfirm" placeholder="Confirme sua senha" required minlength="6">
                </div>
                
                <button type="submit" class="btn btn-primary">Criar Conta</button>
            </form>
            
            <div class="toggle-text">
                <span id="toggleText">Não tem conta? <a onclick="toggleForm()">Criar</a></span>
            </div>
        </div>
    </div>
    
    <div class="status-toast" id="statusToast"></div>
    
    <script>
        const API_URL = "https://treino-pro-api.onrender.com";
        
        function toggleForm() {
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');
            const toggleText = document.getElementById('toggleText');
            
            loginForm.classList.toggle('hidden');
            signupForm.classList.toggle('hidden');
            
            if (loginForm.classList.contains('hidden')) {
                toggleText.innerHTML = 'Já tem conta? <a onclick="toggleForm()">Entrar</a>';
            } else {
                toggleText.innerHTML = 'Não tem conta? <a onclick="toggleForm()">Criar</a>';
            }
            
            clearMessages();
        }
        
        function showLoading(show = true) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }
        
        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('successMsg').style.display = 'none';
        }
        
        function showSuccess(msg) {
            const el = document.getElementById('successMsg');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('errorMsg').style.display = 'none';
        }
        
        function clearMessages() {
            document.getElementById('errorMsg').style.display = 'none';
            document.getElementById('successMsg').style.display = 'none';
        }
        
        function toast(msg, type) {
            const t = document.getElementById('statusToast');
            t.textContent = msg;
            t.className = `status-toast ${type}`;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3500);
        }
        
        async function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showError('Email e senha obrigatórios');
                return;
            }
            
            showLoading(true);
            clearMessages();
            
            try {
                const response = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showSuccess('Login realizado! Redirecionando...');
                    toast('✅ Bem-vindo!', 'success');
                    
                    // Salvar dados localmente
                    localStorage.setItem('user_id', data.user_id);
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('user_email', email);
                    localStorage.setItem('has_anamnese', data.has_anamnese);
                    
                    // Redirecionar
                    setTimeout(() => {
                        if (data.has_anamnese) {
                            window.location.href = 'dashboard.html';
                        } else {
                            window.location.href = 'anamnese.html';
                        }
                    }, 1500);
                } else {
                    showError(data.error || 'Erro ao fazer login');
                    toast('❌ ' + (data.error || 'Erro'), 'error');
                }
            } catch (error) {
                console.error('Erro:', error);
                showError('Erro de conexão: ' + error.message);
                toast('❌ Erro de conexão', 'error');
            } finally {
                showLoading(false);
            }
        }
        
        async function handleSignup(event) {
            event.preventDefault();
            
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const passwordConfirm = document.getElementById('signupPasswordConfirm').value;
            
            if (!name || !email || !password || !passwordConfirm) {
                showError('Preencha todos os campos');
                return;
            }
            
            if (password !== passwordConfirm) {
                showError('Senhas não coincidem');
                return;
            }
            
            if (password.length < 6) {
                showError('Senha deve ter mínimo 6 caracteres');
                return;
            }
            
            showLoading(true);
            clearMessages();
            
            try {
                const response = await fetch(`${API_URL}/api/auth/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, name })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showSuccess('Conta criada! Prosseguindo para anamnese...');
                    toast('✅ Conta criada!', 'success');
                    
                    // Salvar dados localmente
                    localStorage.setItem('user_id', data.user_id);
                    localStorage.setItem('user_email', email);
                    localStorage.setItem('user_name', name);
                    
                    // Redirecionar para anamnese
                    setTimeout(() => {
                        window.location.href = 'anamnese.html';
                    }, 1500);
                } else {
                    showError(data.error || 'Erro ao criar conta');
                    toast('❌ ' + (data.error || 'Erro'), 'error');
                }
            } catch (error) {
                console.error('Erro:', error);
                showError('Erro de conexão: ' + error.message);
                toast('❌ Erro de conexão', 'error');
            } finally {
                showLoading(false);
            }
        }
    </script>
</body>
</html>
