<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Treino Pro">
    <title>Treino Pro - Treinos com IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-dark: #0a0e27;
            --bg-card: #1a1f3a;
            --bg-input: #242a45;
            --primary: #FF6B35;
            --primary-light: #FF8A5B;
            --secondary: #00d4ff;
            --accent-purple: #7c3aed;
            --text-primary: #ffffff;
            --text-secondary: #a0aec0;
            --border: #2d3748;
            --success: #10b981;
            --error: #ef4444;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #0f1233 100%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 450px;
        }
        
        .card {
            background: linear-gradient(135deg, var(--bg-card) 0%, rgba(26, 31, 58, 0.5) 100%);
            border: 2px solid var(--border);
            border-radius: 20px;
            padding: 32px 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        
        .logo p {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 600;
        }
        
        .tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .tab-btn {
            padding: 12px;
            border: 2px solid var(--border);
            background: rgba(255, 107, 53, 0.1);
            color: var(--text-secondary);
            font-weight: 700;
            cursor: pointer;
            border-radius: 10px;
            font-size: 13px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }
        
        .tab-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .form-group {
            margin-bottom: 18px;
        }
        
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-secondary);
            text-transform: uppercase;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            background: var(--bg-input);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--secondary);
            background: rgba(0, 212, 255, 0.05);
        }
        
        .form-group input::placeholder {
            color: rgba(160, 174, 192, 0.5);
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s ease;
            margin-top: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent-purple) 100%);
            color: white;
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(255, 107, 53, 0.4);
        }
        
        .btn-primary:active:not(:disabled) {
            transform: translateY(0);
        }
        
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            gap: 10px;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        
        .divider-text {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-weight: 700;
        }
        
        .error-message {
            background: rgba(239, 68, 68, 0.15);
            border: 2px solid var(--error);
            color: #fca5a5;
            padding: 12px;
            border-radius: 10px;
            font-size: 12px;
            margin-bottom: 16px;
            display: none;
            font-weight: 600;
        }
        
        .success-message {
            background: rgba(16, 185, 129, 0.15);
            border: 2px solid var(--success);
            color: #86efac;
            padding: 12px;
            border-radius: 10px;
            font-size: 12px;
            margin-bottom: 16px;
            display: none;
            font-weight: 600;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .spinner {
            border: 3px solid rgba(255, 107, 53, 0.2);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-text {
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        .footer-text {
            text-align: center;
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 20px;
        }
        
        .footer-text a {
            color: var(--secondary);
            text-decoration: none;
            font-weight: 700;
        }
        
        @media (max-width: 480px) {
            .card {
                padding: 24px 16px;
            }
            
            .logo h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">
                <h1>💪 TREINO PRO</h1>
                <p>Treinos personalizados com IA</p>
            </div>
            
            <!-- TABS -->
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('login')">🔓 Login</button>
                <button class="tab-btn" onclick="switchTab('signup')">✨ Criar Conta</button>
            </div>
            
            <!-- LOGIN -->
            <div id="login" class="tab-content active">
                <div class="error-message" id="loginError"></div>
                <div class="success-message" id="loginSuccess"></div>
                
                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>📧 Email</label>
                        <input type="email" id="loginEmail" placeholder="seu@email.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label>🔑 Senha</label>
                        <input type="password" id="loginPassword" placeholder="Sua senha" required>
                    </div>
                    
                    <div class="loading" id="loginLoading">
                        <div class="spinner"></div>
                        <div class="loading-text">Entrando...</div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" id="loginBtn">Entrar</button>
                </form>
            </div>
            
            <!-- SIGNUP -->
            <div id="signup" class="tab-content">
                <div class="error-message" id="signupError"></div>
                <div class="success-message" id="signupSuccess"></div>
                
                <form id="signupForm" onsubmit="handleSignup(event)">
                    <div class="form-group">
                        <label>👤 Nome Completo</label>
                        <input type="text" id="signupName" placeholder="Seu nome" required>
                    </div>
                    
                    <div class="form-group">
                        <label>📧 Email</label>
                        <input type="email" id="signupEmail" placeholder="seu@email.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label>🔑 Senha</label>
                        <input type="password" id="signupPassword" placeholder="Mínimo 6 caracteres" required minlength="6">
                    </div>
                    
                    <div class="form-group">
                        <label>🔑 Confirmar Senha</label>
                        <input type="password" id="signupPasswordConfirm" placeholder="Confirme sua senha" required>
                    </div>
                    
                    <div class="loading" id="signupLoading">
                        <div class="spinner"></div>
                        <div class="loading-text">Criando conta...</div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" id="signupBtn">Criar Conta</button>
                </form>
            </div>
            
            <div class="footer-text">
                🏋️ Personalize seu treino com inteligência artificial
            </div>
        </div>
    </div>
    
    <script>
        const API_URL = "https://treino-pro-api.onrender.com";
        
        // ============================================================
        // UI FUNCTIONS
        // ============================================================
        
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
            
            clearMessages();
        }
        
        function showError(tab, msg) {
            const el = document.getElementById(`${tab}Error`);
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById(`${tab}Success`).style.display = 'none';
        }
        
        function showSuccess(tab, msg) {
            const el = document.getElementById(`${tab}Success`);
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById(`${tab}Error`).style.display = 'none';
        }
        
        function clearMessages() {
            document.querySelectorAll('.error-message, .success-message').forEach(el => {
                el.style.display = 'none';
            });
        }
        
        function setLoading(tab, show) {
            document.getElementById(`${tab}Loading`).style.display = show ? 'block' : 'none';
            document.getElementById(`${tab}Btn`).disabled = show;
        }
        
        // ============================================================
        // LOGIN
        // ============================================================
        
        async function handleLogin(e) {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showError('login', '❌ Email e senha obrigatórios');
                return;
            }
            
            setLoading('login', true);
            clearMessages();
            
            try {
                const response = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    // Salvar dados
                    localStorage.setItem('user_id', result.user_id);
                    localStorage.setItem('user_email', result.email);
                    localStorage.setItem('user_name', result.name);
                    
                    showSuccess('login', '✅ Login bem-sucedido! Redirecionando...');
                    
                    // Redirecionar
                    if (result.has_anamnese) {
                        setTimeout(() => window.location.href = 'treinos.html', 1500);
                    } else {
                        setTimeout(() => window.location.href = 'anamnese.html', 1500);
                    }
                } else {
                    showError('login', result.error || '❌ Erro ao fazer login');
                    setLoading('login', false);
                }
            } catch (error) {
                console.error('Erro:', error);
                showError('login', '❌ Erro de conexão: ' + error.message);
                setLoading('login', false);
            }
        }
        
        // ============================================================
        // SIGNUP
        // ============================================================
        
        async function handleSignup(e) {
            e.preventDefault();
            
            const name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;
            const passwordConfirm = document.getElementById('signupPasswordConfirm').value;
            
            if (!name || !email || !password) {
                showError('signup', '❌ Todos os campos são obrigatórios');
                return;
            }
            
            if (password.length < 6) {
                showError('signup', '❌ Senha deve ter mínimo 6 caracteres');
                return;
            }
            
            if (password !== passwordConfirm) {
                showError('signup', '❌ Senhas não conferem');
                return;
            }
            
            setLoading('signup', true);
            clearMessages();
            
            try {
                const response = await fetch(`${API_URL}/api/auth/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    // Salvar dados
                    localStorage.setItem('user_id', result.user_id);
                    localStorage.setItem('user_email', result.email);
                    localStorage.setItem('user_name', result.user_id);
                    
                    showSuccess('signup', '✅ Conta criada! Redirecionando para anamnese...');
                    
                    setTimeout(() => window.location.href = 'anamnese.html', 1500);
                } else {
                    showError('signup', result.error || '❌ Erro ao criar conta');
                    setLoading('signup', false);
                }
            } catch (error) {
                console.error('Erro:', error);
                showError('signup', '❌ Erro de conexão: ' + error.message);
                setLoading('signup', false);
            }
        }
        
        // ============================================================
        // VERIFICAR SE JÁ ESTÁ LOGADO
        // ============================================================
        
        window.addEventListener('load', () => {
            const userId = localStorage.getItem('user_id');
            if (userId) {
                // Já está logado, redirecionar
                window.location.href = 'anamnese.html';
            }
        });
    </script>
</body>
</html>
